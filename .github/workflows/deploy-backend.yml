name: Deploy GAMH Backend to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual triggers

env:
  APP_DIR: /home/ubuntu/GAMH-Backend
  SERVICE_NAME: gamh-server

