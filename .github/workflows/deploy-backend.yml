          script: |
            # Sourcing profile/bashrc/NVM to load Node and npm into non-interactive path
            [ -f "$HOME/.profile" ] && source "$HOME/.profile"
            [ -f "$HOME/.bashrc" ] && source "$HOME/.bashrc"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
            node -v
            npm -v

            set -e

            echo "═══ Deploying GAMH Backend ═══"

            # Navigate to app directory
            cd ${{ env.APP_DIR }}

            # Pull latest code
            echo "[1/4] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Install production dependencies
            echo "[2/4] Installing dependencies..."
            npm ci --omit=dev

            # Ensure .env exists
            if [ ! -f .env ]; then
              echo "ERROR: .env file missing on server!"
              exit 1
            fi

            # Restart the service via PM2
            echo "[3/4] Restarting service via PM2..."
            pm2 restart ${{ env.SERVICE_NAME }} || pm2 start server.js --name "${{ env.SERVICE_NAME }}"
            pm2 save

            # Wait and verify
            echo "[4/4] Verifying deployment..."
            sleep 3
            if pm2 describe "${{ env.SERVICE_NAME }}" >/dev/null; then
              echo "✅ Deployment successful! Service is running in PM2."
              pm2 status
            else
              echo "❌ Service failed to start in PM2!"
              pm2 logs ${{ env.SERVICE_NAME }} --lines 20 --no-daemon
              exit 1
            fi

            # Quick health check
            sleep 2
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_STATUS)"
            else
              echo "⚠️  Health check returned HTTP $HTTP_STATUS"
            fi
