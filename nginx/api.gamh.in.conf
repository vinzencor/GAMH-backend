# /etc/nginx/sites-available/api.gamh.in
# Nginx reverse proxy configuration for GAMH Backend API
# This terminates SSL and proxies to the Node.js app on port 5000

server {
    listen 80;
    server_name api.gamh.in;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.gamh.in;

    # ─── SSL (managed by Certbot) ────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.gamh.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gamh.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security headers ─────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Request limits ────────────────────────────────────────────────────────────
    client_max_body_size 20M;

    # ─── Proxy to Node.js ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
    }
}
